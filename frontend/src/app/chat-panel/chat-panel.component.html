<div class="chat-panel">
  <div class="chat-header">
    <span class="chat-title">Dashboard Assistant</span>
    <span class="chat-status" [class.online]="!isLoading">
      {{ isLoading ? 'Thinking...' : 'Ready' }}
    </span>
  </div>

  <div class="messages" #messagesContainer>
    <div *ngIf="history.length === 0" class="empty-state">
      <p>Start a conversation. Try:</p>
      <ul>
        <li>"Draw a bar chart of monthly sales: 12, 45, 33, 67, 20"</li>
        <li>"Show me a Q3 summary"</li>
        <li>"Display a table with Name, Age, City"</li>
        <li>"Clear the dashboard"</li>
      </ul>
    </div>

    <div
      *ngFor="let msg of history; let i = index; trackBy: trackByIndex"
      class="message"
      [class.user]="msg.role === 'user'"
      [class.assistant]="msg.role === 'assistant'"
    >
      <div class="bubble">{{ msg.content }}</div>
    </div>

    <div *ngIf="isLoading" class="message assistant">
      <div class="bubble typing">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div #messagesEnd></div>
  </div>

  <div class="input-area">
    <textarea
      #inputEl
      [(ngModel)]="inputText"
      (keydown)="onKeyDown($event)"
      placeholder="Type a message… (Enter to send)"
      rows="1"
      [disabled]="isLoading"
    ></textarea>
    <button (click)="submit()" [disabled]="isLoading || !inputText.trim()">
      Send
    </button>
  </div>
</div>
