<div class="panel">

  <!-- Placeholder -->
  <div *ngIf="widgets.length === 0" class="placeholder">
    <span class="placeholder-icon">📊</span>
    <p>Ask the chatbot to render something.</p>
  </div>

  <!-- Free-form draggable canvas -->
  <div *ngIf="widgets.length > 0" class="canvas" [class.dragging]="isDragging">
    <ng-container *ngFor="let widget of widgets; trackBy: trackById">
      <ng-container *ngIf="getComponent(widget.command.type) as comp">
        <div
          class="widget-frame"
          [class.wide]="widget.command.type === 'render_map'"
          [style.left.px]="widget.x"
          [style.top.px]="widget.y"
        >
          <!-- Drag handle -->
          <div class="widget-handle" (mousedown)="onDragStart($event, widget)">
            <span class="handle-grip">⠿</span>
            <div class="handle-actions">
              <button
                class="handle-btn"
                [class.active]="debugWidgetId === widget.id"
                (mousedown)="$event.stopPropagation()"
                (click)="toggleDebug(widget.id)"
                title="Inspect payload"
              >&#123;&#125;</button>
              <button
                class="handle-btn close-btn"
                (mousedown)="$event.stopPropagation()"
                (click)="removeWidget(widget.id)"
                title="Remove widget"
              >×</button>
            </div>
          </div>

          <!-- Debug payload inspector -->
          <div *ngIf="debugWidgetId === widget.id" class="debug-panel">
            <div class="debug-header">
              <span class="debug-type">{{ widget.command.type }}</span>
            </div>
            <pre class="debug-json">{{ formatPayload(widget.command) }}</pre>
          </div>

          <!-- Widget content — rendered dynamically, no *ngIf per type -->
          <div class="widget-content">
            <ng-container
              [ngComponentOutlet]="comp"
              [ngComponentOutletInputs]="getInputs(widget.command)"
            ></ng-container>
          </div>
        </div>
      </ng-container>
    </ng-container>
  </div>

</div>
